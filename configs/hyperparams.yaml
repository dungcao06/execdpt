# ExecDPT — Model Hyperparameters
# Default configurations for ExecDPT-30M and ExecDPT-150M

model:
  # ── ExecDPT-30M (primary) ──
  small:
    name: "ExecDPT-30M"
    n_layers: 12
    d_model: 384
    n_heads: 6
    d_ff: 1536          # 4 × d_model
    dropout: 0.1
    max_context_length: 1000    # transitions
    n_action_bins: 11
    state_dim: 50
    approx_params: "30M"

  # ── ExecDPT-150M (scaling experiment) ──
  large:
    name: "ExecDPT-150M"
    n_layers: 24
    d_model: 768
    n_heads: 12
    d_ff: 3072
    dropout: 0.1
    max_context_length: 1000
    n_action_bins: 11
    state_dim: 50
    approx_params: "150M"

# ── Training ──
training:
  optimizer: "adamw"
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 2000
  total_steps: 50000
  batch_size: 256
  gradient_clip: 1.0
  loss: "cross_entropy"   # over action bins
  eval_every: 1000
  save_every: 5000
  seed: 42

# ── PPO Expert Training ──
ppo:
  algorithm: "PPO"
  n_env_steps: 1_000_000
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  n_epochs: 10
  batch_size: 64
  entropy_coef: 0.01
  value_loss_coef: 0.5
  convergence_threshold_bps: 2.0   # must beat TWAP by ≥2 bps

# ── Trajectory Collection ──
trajectory:
  behavior_policy_mix:
    random: 0.4
    almgren_chriss: 0.3
    noisy_ppo: 0.3
  min_transitions_per_task: 1000
  context_lengths: [0, 10, 50, 200, 1000]

# ── Evaluation ──
evaluation:
  bootstrap_resamples: 1000
  confidence_level: 0.95
  paired_by: "task"
  correction: "bonferroni"
  n_pairwise_comparisons: 21
